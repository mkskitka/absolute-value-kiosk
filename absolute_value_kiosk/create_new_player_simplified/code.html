<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Absolute Value - Create New Player</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=VT323&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#9cff93",
              "secondary": "#ff725e",
              "background": "#000000",
            },
            fontFamily: {
              "pixel": ["VT323", "monospace"],
            },
            borderRadius: {
                "none": "0px",
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
        }
        input::placeholder {
            color: #555555;
        }
        .pixel-border {
            border: 4px solid white;
        }
        .pixel-border-red {
            border: 4px solid #ff725e;
        }
        .pixel-border-green {
            border: 4px solid #9cff93;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
<main class="max-w-3xl w-full flex flex-col items-center space-y-12">
<!-- Header -->
<h1 class="text-5xl md:text-7xl text-center">CREATE NEW PLAYER</h1>
<!-- Top Section: Profile & Name -->
<div class="w-full flex flex-col md:flex-row items-center md:items-start gap-8">
<!-- Profile Square -->
<div class="w-48 h-48 pixel-border flex items-center justify-center flex-shrink-0">
<span class="text-4xl opacity-50">IMG</span>
</div>
<!-- Name Input -->
<div class="w-full space-y-4">
<label class="text-3xl block border-b-4 border-white pb-1">ENTER NAME</label>
<input class="w-full bg-transparent border-4 border-white text-5xl p-4 focus:ring-0 focus:outline-none uppercase" placeholder="NAME..." type="text" value="BUBBLES"/>
</div>
</div>
<!-- Middle Section: Starting Funds -->
<div class="w-full space-y-8">
<h2 class="text-4xl text-center border-b-4 border-white pb-2 inline-block mx-auto w-full">CHOOSE STARTING FUNDS</h2>
<div class="flex flex-col md:flex-row items-center justify-center gap-8">
<!-- Option Left -->
<button class="flex flex-col items-center p-6 pixel-border-red bg-transparent hover:bg-secondary/10 transition-colors w-full md:w-64 space-y-4">
<span class="text-secondary text-5xl font-bold">-500$</span>
<div class="w-24 h-24 border-2 border-secondary/50 flex items-center justify-center">
<span class="text-secondary/50 text-xl">IMG</span>
</div>
<span class="text-secondary text-2xl">SPAWN IN LUNDERWORLD</span>
</button>
<div class="text-4xl border-4 border-white rounded-full w-16 h-16 flex items-center justify-center flex-shrink-0">OR</div>
<!-- Option Right -->
<button class="flex flex-col items-center p-6 pixel-border-green bg-transparent hover:bg-primary/10 transition-colors w-full md:w-64 space-y-4">
<span class="text-primary text-5xl font-bold">+500$</span>
<div class="w-24 h-24 border-2 border-primary/50 flex items-center justify-center">
<span class="text-primary/50 text-xl">IMG</span>
</div>
<span class="text-primary text-2xl">SPAWN IN LEADWORLD</span>
</button>
</div>
</div>
<!-- Bottom Section: Confirm -->
<div class="w-full pt-8 flex justify-center">
<button onclick="window.location.href='../drink_menu_simplified/code.html';" class="px-16 py-6 border-4 border-white bg-transparent hover:bg-white hover:text-black transition-all text-5xl active:scale-95">
                CONFIRM
            </button>
</div>
</main>
</body></html>
