<html lang="en"><head><style>.custom-scrollbar::-webkit-scrollbar { width: 4px; } .custom-scrollbar::-webkit-scrollbar-track { background: #000; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #fff; }</style></head><body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Absolute Value - Order Drink</title>
<!-- Load Tailwind CSS v3 -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Space Grotesk as a fallback, but using custom pixel font style -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    /* Emulating the 8-bit / pixel font style from the design system */
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    :root {
      --neon-green: #00FF41;
      --neon-red: #FF3131;
    }

    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'VT323', 'Space Grotesk', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .pixel-text-lg { font-size: 2.5rem; line-height: 1; }
    .pixel-text-md { font-size: 1.75rem; line-height: 1.2; }
    .pixel-text-sm { font-size: 1.25rem; line-height: 1.2; }
    
    .text-neon-green { color: var(--neon-green); text-shadow: 0 0 8px rgba(0, 255, 65, 0.6); }
    .text-neon-red { color: var(--neon-red); text-shadow: 0 0 8px rgba(255, 49, 49, 0.6); }
    .border-neon-green { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }
  </style>
<style data-purpose="layout-and-rank">
    /* Rank Scale Visuals */
    .rank-line {
      width: 2px;
      background-color: #FFFFFF;
      position: relative;
    }
    .rank-marker {
      position: absolute;
      left: -10px;
      width: 20px;
      height: 2px;
      background-color: #FFFFFF;
    }
    .rank-indicator-arrow {
      width: 0; 
      height: 0; 
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 12px solid var(--neon-green);
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-right: 5px;
    }
    
    /* Drink Table Borders */
    .drink-table-cell {
      border: 2px solid #FFFFFF;
      padding: 1rem;
    }
    .selected-drink {
      border: 3px solid var(--neon-green) !important;
      position: relative;
      z-index: 10;
    }
    /* Square placeholder style */
    .pixel-border {
        border: 4px solid white;
    }
  </style>
<!-- Top Heading -->
<h1 class="text-5xl md:text-7xl text-center mb-12">ORDER DRINK</h1>
<main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-12 items-start" data-purpose="main-content-container">
<!-- BEGIN: Left Column (Stats and Rank) -->
<div class="flex flex-col gap-12 h-full">
<!-- BEGIN: PlayerStats -->
<section class="flex flex-col gap-4 border-l-4 border-white pl-6" data-purpose="player-info">
<div class="flex flex-col">
<span class="pixel-text-sm opacity-70">Player :</span>
<span class="pixel-text-lg">Bubbles</span>
</div>
<div class="space-y-2 mt-4">
<div class="flex justify-between items-baseline">
<span class="pixel-text-md">Funds :</span>
<span class="pixel-text-md text-neon-green">1200$</span>
</div>
<div class="flex justify-between items-baseline">
<span class="pixel-text-md">Drink Cost :</span>
<span class="pixel-text-md text-neon-green">50$</span>
</div>
<div class="w-full h-px bg-white my-2"></div>
<div class="flex justify-between items-baseline">
<span class="pixel-text-md">Balance :</span>
<span class="pixel-text-md text-neon-green">1150$</span>
</div>
</div>
</section>
<!-- END: PlayerStats -->
<!-- BEGIN: PlayerRankSection -->
<section class="flex flex-col gap-6" data-purpose="player-rank">
<h2 class="pixel-text-md tracking-widest border-b border-white pb-2 w-fit">Player Rank</h2>
<div class="flex items-start gap-8 py-4">
<!-- The Vertical Rank Scale -->
<div class="flex flex-col items-center">
<div class="pixel-text-sm mb-2">2000</div>
<div class="rank-line h-64">
<!-- Top marker -->
<div class="rank-marker top-0"></div>
<!-- Current position indicator based on sketch -->
<div class="absolute" style="top: 15%; left: 0;">
<div class="rank-indicator-arrow"></div>
<div class="whitespace-nowrap ml-4 pixel-text-sm text-neon-green">
                   #20
                </div>
</div>
<!-- Mid markers -->
<div class="rank-marker" style="top: 50%;"></div>
<div class="rank-marker" style="top: 25%; border-top: 1px dashed white; background: transparent; width: 40px; left: -20px;"></div>
<!-- Lead Gap Marker -->
<div class="absolute flex items-center" style="top: 35%; left: 25px;">
<span class="pixel-text-sm text-neon-green">1850 TO LEAD</span>
</div>
<!-- Bottom marker -->
<div class="rank-marker bottom-0"></div>
</div>
<div class="pixel-text-sm mt-2">-200</div>
</div>
<div class="flex flex-col justify-center h-64">
<div class="pixel-text-lg text-neon-green">#20</div>
</div>
</div>
</section>
<!-- END: PlayerRankSection -->
</div>
<!-- END: Left Column -->
<!-- BEGIN: Right Column (Drink Menu) -->
<div class="flex flex-col gap-8">
<!-- BEGIN: DrinkMenuSection -->
<section data-purpose="drink-menu">
<h2 class="pixel-text-lg mb-6 border-b-2 border-white pb-2 text-center md:text-left">Drink Menu</h2>
<div class="grid grid-cols-1 gap-0 max-h-[300px] overflow-y-auto custom-scrollbar border-b-2 border-white">
<!-- VIBEZ | GIN (Selected) -->
<div class="drink-table-cell flex justify-between items-center selected-drink bg-zinc-900" data-purpose="menu-item-selected" style="border-color: #00FF41; box-shadow: 0 0 10px #00FF41;">
<div class="flex flex-col">
<span class="pixel-text-md text-neon-red">Vibez | Gin</span>
</div>
<span class="pixel-text-md text-neon-red">$50</span>
</div>
<!-- SUNRISE | TEQUILA -->
<div class="drink-table-cell flex justify-between items-center border-t-0" data-purpose="menu-item" style="border: 2px solid #00D1FF;">
<div class="flex flex-col">
<span class="pixel-text-md text-neon-red">Sunrise | Tequila</span>
</div>
<span class="pixel-text-md text-neon-red">$50</span>
</div>
<!-- FIZZ | GIN -->
<div class="drink-table-cell flex justify-between items-center border-t-0" data-purpose="menu-item" style="border: 2px solid #FF00FF;">
<div class="flex flex-col">
<span class="pixel-text-md text-neon-red">Fizz | Gin</span>
</div>
<span class="pixel-text-md text-neon-red">$50</span>
</div>
<!-- JUICY | NA -->
<div class="drink-table-cell flex justify-between items-center border-t-0" data-purpose="menu-item" style="border: 2px solid #FFFF00;">
<div class="flex flex-col">
<span class="pixel-text-md text-neon-red">Juicy | NA</span>
</div>
<span class="pixel-text-md text-neon-red">$50</span>
</div>
<!-- GLO | VODKA -->
<div class="drink-table-cell flex justify-between items-center border-t-0" data-purpose="menu-item" style="border: 2px solid #00FFFF;">
<div class="flex flex-col">
<span class="pixel-text-md text-neon-red">Glo | Vodka</span>
</div>
<span class="pixel-text-md text-neon-red">$50</span>
</div>
</div>
</section>
<!-- END: DrinkMenuSection -->
<!-- Image Placeholder Section -->
<div class="w-full flex justify-center md:justify-start">
<div class="w-48 h-48 pixel-border flex items-center justify-center">
<span class="text-4xl opacity-50">IMG</span>
</div>
</div>
</div>
<!-- END: Right Column -->
</main>
<!-- Bottom Section: Order Button -->
<div class="w-full pt-12 flex justify-center">
<button onclick="window.location.href='../change_economy/code.html';" class="px-16 py-6 border-4 border-white bg-transparent hover:bg-white hover:text-black transition-all text-5xl active:scale-95 font-pixel">
        ORDER DRINK FOR 50$
    </button>
</div>
</body></html>
